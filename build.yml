name: Build & Zip Desktop App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            platform: win
            ext: exe
          - os: macos-latest
            platform: mac
            ext: dmg
          - os: ubuntu-latest
            platform: linux
            ext: AppImage

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app for ${{ matrix.platform }}
        run: npm run dist:${{ matrix.platform }}

      - name: Zip the installer (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          7z a ../FedPromptly-Windows.zip *.exe *.dll

      - name: Zip the installer (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r ../FedPromptly-macOS.zip *.dmg

      - name: Zip the installer (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          zip -r ../FedPromptly-Linux.zip *.AppImage

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: FedPromptly-${{ matrix.platform }}
          path: FedPromptly-*.zip
